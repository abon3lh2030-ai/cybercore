<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Checker</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b1120;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .box {
            background: #141c2f;
            padding: 28px;
            border-radius: 18px;
            width: 430px;
            box-shadow: 0 0 20px rgba(0, 0, 0, .4);
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            color: #4f9dff;
            margin-top: 0;
        }

        input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            background: #fff;
            color: #000;
        }

        .bar {
            height: 12px;
            background: #333;
            border-radius: 8px;
            margin: 16px 0;
            overflow: hidden;
        }

        .fill {
            height: 100%;
            width: 0;
            background: #ff3b30;
            transition: 0.3s;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 16px 0;
        }

        li {
            margin: 8px 0;
            font-size: 15px;
        }

        a {
            display: block;
            margin-top: 18px;
            color: #4f9dff;
            text-decoration: none;
            text-align: center;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>Password Strength Checker</h1>
    
    <input id="pwd" type="password" placeholder="Type a password">
    
    <div class="bar">
        <div id="fill" class="fill"></div>
    </div>
    
    <h3 id="status">Strength: -</h3>
    
    <ul>
        <li id="len">❌ 12+ Characters</li>
        <li id="up">❌ Uppercase</li>
        <li id="low">❌ Lowercase</li>
        <li id="num">❌ Number</li>
        <li id="sym">❌ Symbol</li>
    </ul>
    
    <a href="../index.html">← Back</a>
</div>

<script>
    const p = document.getElementById('pwd');
    const fill = document.getElementById('fill');
    const status = document.getElementById('status');

    const checks = {
        len: [/^.{12,}$/, '12+ Characters'],
        up: [/[A-Z]/, 'Uppercase'],
        low: [/[a-z]/, 'Lowercase'],
        num: [/\d/, 'Number'],
        sym: [/[^A-Za-z0-9]/, 'Symbol']
    };

    p.oninput = () => {
        let score = 0;
        let val = p.value;

        for (const k in checks) {
            let isOk = checks[k][0].test(val);
            document.getElementById(k).textContent = (isOk ? '✅ ' : '❌ ') + checks[k][1];
            if (isOk) score++;
        }

        let pct = score * 20;
        fill.style.width = pct + '%';

        if (pct < 40) {
            fill.style.background = '#ff3b30';
            status.textContent = 'Strength: Weak (' + pct + '%)';
        } else if (pct < 80) {
            fill.style.background = '#ffcc00';
            status.textContent = 'Strength: Medium (' + pct + '%)';
        } else {
            fill.style.background = '#34c759';
            status.textContent = 'Strength: Strong (' + pct + '%)';
        }
    };
</script>

</body>
</html>
