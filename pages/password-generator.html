<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Password Generator | CyberCore</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#0b1120;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:white;
}

.container{
width:420px;
background:#141c2f;
padding:30px;
border-radius:18px;
box-shadow:0 0 25px rgba(0,0,0,.4);
}

h1{
text-align:center;
margin-bottom:25px;
color:#4f9dff;
}

.password-box{
display:flex;
margin-bottom:20px;
}

.password-box input{
flex:1;
padding:15px;
font-size:18px;
border:none;
outline:none;
border-radius:10px 0 0 10px;
}

.password-box button{
width:60px;
border:none;
background:#4f9dff;
color:white;
cursor:pointer;
border-radius:0 10px 10px 0;
}

.option{
margin:15px 0;
display:flex;
justify-content:space-between;
align-items:center;
}

input[type=range]{
width:100%;
margin-top:10px;
}

.generate{
width:100%;
padding:15px;
margin-top:20px;
border:none;
background:#4f9dff;
color:white;
font-size:18px;
cursor:pointer;
border-radius:10px;
transition:.3s;
}

.generate:hover{
transform:scale(1.02);
}

#strength{
margin-top:20px;
font-weight:bold;
text-align:center;
}

.back{
display:block;
margin-top:25px;
text-align:center;
color:#4f9dff;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h1>Password Generator</h1>

<div class="password-box">
<input id="password" readonly>
<button onclick="copyPassword()">📋</button>
</div>

<label>Length:
<span id="lengthValue">16</span>
</label>

<input
type="range"
id="length"
min="8"
max="64"
value="16"
>

<div class="option">
<label>Uppercase</label>
<input type="checkbox" id="upper" checked>
</div>

<div class="option">
<label>Lowercase</label>
<input type="checkbox" id="lower" checked>
</div>

<div class="option">
<label>Numbers</label>
<input type="checkbox" id="numbers" checked>
</div>

<div class="option">
<label>Symbols</label>
<input type="checkbox" id="symbols" checked>
</div>

<button
class="generate"
onclick="generatePassword()"
>
Generate Password
</button>

<div id="strength"></div>

<a href="../index.html" class="back">
← Back
</a>

</div>

<script>

const lengthSlider=document.getElementById("length");
const lengthValue=document.getElementById("lengthValue");

lengthSlider.oninput=()=>{
lengthValue.innerText=lengthSlider.value;
}

function generatePassword(){

const upper="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const lower="abcdefghijklmnopqrstuvwxyz";
const numbers="0123456789";
const symbols="!@#$%^&*()_+-=[]{}<>?/";

let chars="";

if(document.getElementById("upper").checked) chars+=upper;
if(document.getElementById("lower").checked) chars+=lower;
if(document.getElementById("numbers").checked) chars+=numbers;
if(document.getElementById("symbols").checked) chars+=symbols;

if(chars===""){
alert("Select at least one option");
return;
}

let password="";

for(let i=0;i<lengthSlider.value;i++){

password+=chars[Math.floor(Math.random()*chars.length)];

}

document.getElementById("password").value=password;

checkStrength(password);

}

function copyPassword(){

const input=document.getElementById("password");

navigator.clipboard.writeText(input.value);

alert("Copied!");

}

function checkStrength(password){

let score=0;

if(password.length>=12) score++;

if(/[A-Z]/.test(password)) score++;

if(/[a-z]/.test(password)) score++;

if(/[0-9]/.test(password)) score++;

if(/[^A-Za-z0-9]/.test(password)) score++;

const strength=document.getElementById("strength");

if(score<=2){

strength.innerHTML="🔴 Weak";

}else if(score<=4){

strength.innerHTML="🟡 Medium";

}else{

strength.innerHTML="🟢 Strong";

}

}

generatePassword();

</script>

</body>
</html>
