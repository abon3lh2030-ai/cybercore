<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>URL Scanner - No API Required</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0b1120;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .box {
            background: #141c2f;
            padding: 24px;
            border-radius: 16px;
            width: 700px;
            box-sizing: border-box;
        }
        input[type="text"] {
            width: 100%;
            height: 44px;
            border-radius: 8px;
            padding: 10px;
            box-sizing: border-box;
            background: #0b1120;
            color: #fff;
            border: 1px solid #1f2335;
            margin-bottom: 12px;
            font-size: 15px;
        }
        .out {
            background: #0b1120;
            padding: 12px;
            border-radius: 6px;
            word-break: break-all;
            margin: 8px 0;
            font-family: monospace;
            line-height: 1.6;
            font-size: 14px;
        }
        button {
            padding: 10px 16px;
            margin: 6px 0;
            cursor: pointer;
            background: #00f0ff;
            color: #0b1120;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.2s;
        }
        button:hover {
            background: #00b8d4;
        }
        .safe { color: #2ed573; font-weight: bold; }
        .danger { color: #ff4757; font-weight: bold; }
        .warning { color: #ffa502; font-weight: bold; }
        .vt-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 12px;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 13px;
        }
        .vt-btn:hover { background: #2563eb; }
    </style>
</head>
<body>

    <div class="box">
        <h2>Smart URL Scanner (Free & Secure)</h2>
        <input type="text" id="urlInput" placeholder="Enter URL to scan (e.g., https://example.com)">
        <br>
        <button onclick="scanURL()">Scan URL</button>
        <div id="res"></div>
    </div>

    <script>
        function scanURL() {
            let urlInputValue = document.getElementById('urlInput').value.trim();
            const resultDiv = document.getElementById('res');

            if (!urlInputValue) {
                alert("Please enter a URL!");
                return;
            }

            // إضافة http تلقائياً إذا نسى المستخدم كتابتها لضمان التحليل الصحيح
            if (!/^https?:\/\//i.test(urlInputValue)) {
                urlInputValue = 'http://' + urlInputValue;
            }

            resultDiv.innerHTML = '<h4>Scanning URL Structure...</h4><div class="out">Analyzing URL safety metrics...</div>';

            setTimeout(() => {
                try {
                    const urlObj = new URL(urlInputValue);
                    let riskScore = 0;
                    let findings = [];

                    // 1. فحص الكلمات الدلالية المشبوهة (التصيد الاحتيالي)
                    const suspiciousKeywords = ['login', 'verify', 'update-account', 'banking', 'secure-signin', 'free-gift', 'crypto-bonus'];
                    suspiciousKeywords.forEach(word => {
                        if (urlObj.href.toLowerCase().includes(word)) {
                            riskScore += 30;
                            findings.push(`Contains suspicious keyword: "${word}" (Potential Phishing)`);
                        }
                    });

                    // 2. فحص الامتدادات الخطيرة بداخل الرابط
                    if (/\.(exe|scr|bat|sh|msi|zip|rar)$/i.test(urlObj.pathname)) {
                        riskScore += 50;
                        findings.push("URL points directly to an executable or archive file (High Risk of Malware download)");
                    }

                    // 3. فحص استخدام عناوين IP مباشرة بدلاً من الدومين
                    const ipRegex = /^(\d{1,3}\.){3}\d{1,3}$/;
                    if (ipRegex.test(urlObj.hostname)) {
                        riskScore += 40;
                        findings.push("URL uses a raw IP address instead of a domain name (Common in cyber attacks)");
                    }

                    // 4. فحص المنافذ غير المعتادة
                    if (urlObj.port && !['80', '443'].includes(urlObj.port)) {
                        riskScore += 20;
                        findings.push(`URL uses an unusual web port: :${urlObj.port}`);
                    }

                    // تحديد النتيجة بناءً على التقييم
                    let verdict = '<span class="safe">CLEAN / SAFE</span>';
                    if (riskScore >= 50) {
                        verdict = '<span class="danger">DANGEROUS / HIGH RISK</span>';
                    } else if (riskScore > 0) {
                        verdict = '<span class="warning">SUSPICIOUS / MEDIUM RISK</span>';
                    }

                    if (findings.length === 0) {
                        findings.push("No immediate structural anomalies or phishing patterns detected.");
                    }

                    // توليد رابط فحص مباشر على موقع VirusTotal بدون الحاجة لـ API مفتاح
                    // يتم تشفير الرابط بـ SHA-256 أو إرساله مباشرة للبحث عبر واجهة VT العامة
                    const cleanUrlForVT = urlInputValue.replace(/^https?:\/\//, '');
                    const vtSearchUrl = `https://www.virustotal.com/gui/search/${encodeURIComponent(urlInputValue)}`;

                    resultDiv.innerHTML = '';
                    const div = document.createElement('div');
                    div.innerHTML = `
                        <h4>Analysis Report</h4>
                        <div class="out">
                            <strong>Scanned URL:</strong> ${urlInputValue}<br>
                            <strong>Domain:</strong> ${urlObj.hostname}<br>
                            <strong>Safety Status:</strong> ${verdict}<br><br>
                            <strong>Local Engine Analysis:</strong><br>
                            - ${findings.join('<br>- ')}
                        </div>
                        <a href="${vtSearchUrl}" target="_blank" class="vt-btn">🔍 View Full VirusTotal Global Report</a>
                    `;
                    resultDiv.appendChild(div);

                } catch (e) {
                    resultDiv.innerHTML = `<h4>Error</h4><div class="out" style="color:#ff4757;">Invalid URL format. Please enter a valid URL (e.g., website.com).</div>`;
                }
            }, 600); // محاكاة وقت الفحص السريع
        }
    </script>

</body>
</html>
